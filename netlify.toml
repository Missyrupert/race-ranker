[build]
  command = "npm run build"
  publish = ".next"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  [functions."fetch-race"]
    timeout = 10
  [functions."fetch-meetings"]
    timeout = 10
  [functions."today"]
    timeout = 120

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
